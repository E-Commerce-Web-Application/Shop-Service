apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-service-deployment
  labels:
    app: shop-service
spec:
  replicas: 2,
  selector:
    matchLabels:
      app: shop-service
  template:
    metadata:
      labels:
        app: shop-service
    spec:
      containers:
        - name: shop-service
          image: shop-service
          imagePullPolicy: always
          ports:
          - containerPort: 5000
          - containerPort: 50051
          envFrom:
          - secretRef:
              name: shop-service-envs 
